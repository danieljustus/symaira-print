name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: latest
          # The Homebrew tap publish step needs a separate cross-repo token
          # (HOMEBREW_TAP_GITHUB_TOKEN) that is not yet configured for this
          # repository, so it is skipped here; binaries and the GitHub release
          # itself do not depend on it. Drop --skip=homebrew once the token
          # is added as a repository secret.
          args: release --clean --skip=homebrew
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  release-client:
    needs: [goreleaser]
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'

      - name: Install Build Tools
        run: brew install xcodegen create-dmg

      - name: Build Go Engine
        run: make build

      - name: Generate Xcode Project
        run: make client-gen

      - name: Build macOS App
        run: make client-build

      - name: Package DMG Installer
        run: make client-dmg

      - name: Upload DMG to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF##*/}"
          echo "Uploading dist/Symprint.dmg to release $TAG_NAME..."
          gh release upload "$TAG_NAME" dist/Symprint.dmg --clobber

